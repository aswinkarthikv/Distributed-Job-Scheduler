version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: djs-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: scheduler
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: djs-backend
    restart: always
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: "postgresql://postgres:postgrespassword@db:5432/scheduler?schema=public"
      JWT_SECRET: "djs_control_plane_production_secret"
      NODE_ENV: "production"
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: djs-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
